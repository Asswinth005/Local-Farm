<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>Local Farm · Sign Up</title>
    <!-- farm favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%2336634B' d='M346.7 76.6c-9.6-3.7-20.1-3.2-29.3 .7-21.5 9-38.7 29.5-47.4 54.2-9.2-24.7-26.4-45.2-47.9-54.2-9.2-3.9-19.7-4.4-29.3-.7-30 11.6-51 42.7-47.6 76.3 2.7 27 22 49.8 46 58.1-24 8.3-43.3 31.1-46 58.1-3.4 33.6 17.6 64.7 47.6 76.3 9.6 3.7 20.1 3.2 29.3-.7 21.5-9 38.7-29.5 47.4-54.2 9.2 24.7 26.4 45.2 47.9 54.2 9.2 3.9 19.7 4.4 29.3 .7 30-11.6 51-42.7 47.6-76.3-2.7-27-22-49.8-46-58.1 24-8.3 43.3-31.1 46-58.1 3.4-33.6-17.6-64.7-47.6-76.3zM256 269.8c-11.8 0-21.4-9.6-21.4-21.4s9.6-21.4 21.4-21.4 21.4 9.6 21.4 21.4-9.6 21.4-21.4 21.4z'/></svg>">
    
    <!-- Tailwind + farm theme config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'farm-peat': '#36634B',
                        'farm-sprout': '#7AA65A',
                        'farm-cream': '#FEF7E4',
                        'farm-clay': '#C96E4B',
                        'farm-stone': '#D9C5B3',
                        'farm-charcoal': '#2E3F2F',
                        'farm-moss': '#5F8B6B',
                        'dark-bg': '#1F2A1E',
                        'dark-card': '#2C3A2A',
                        'dark-surface': '#364433',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                        'display': ['Playfair Display', 'serif'],
                        'alt': ['Montserrat', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out',
                        'float': 'float 6s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } }
                    }
                }
            }
        }
    </script>
    
    <!-- Fonts + Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ----- NO SCROLL — fit exactly one screen ----- */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #FEF7E4;
            color: #2E3F2F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .dark body {
            background-color: #1F2A1E;
            color: #e2e6da;
        }
        
        /* toggle buttons — positioned top-right */
        .theme-toggle-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }
        
        .toggle-btn {
            width: 42px; 
            height: 42px; 
            border-radius: 12px;
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            background: #e6dccb; 
            color: #36634B;
            transition: all 0.2s ease; 
            border: none; 
            cursor: pointer;
            font-size: 1.1rem;
        }
        .dark .toggle-btn { 
            background: #3d5c3a; 
            color: #c8f0a0; 
        }
        .toggle-btn:hover { 
            background: #7AA65A; 
            color: white; 
        }
        .dark .toggle-btn:hover { 
            background: #7AA65A; 
            color: #1F2A1E; 
        }
        .toggle-btn.active { 
            background: #36634B; 
            color: white; 
        }
        .dark .toggle-btn.active { 
            background: #7AA65A; 
            color: #1F2A1E; 
        }

        /* SIGNUP CARD — farm theme */
        .signup-card {
            background: white;
            border-radius: 36px;
            padding: 2.2rem 2rem 2rem;
            box-shadow: 0 20px 45px rgba(54,99,75,0.12);
            border: 1px solid rgba(122,166,90,0.2);
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }
        .dark .signup-card {
            background: #2C3A2A;
            border-color: #4A6B4A;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* input — farm style */
        .signup-input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 3rem;
            border-radius: 50px;
            border: 1px solid #D9C5B3;
            background: white;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #2E3F2F;
        }
        .dark .signup-input {
            background: #1F2A1E;
            border-color: #4A6B4A;
            color: #f0f0f0;
        }
        .signup-input:focus {
            outline: none;
            border-color: #7AA65A;
            box-shadow: 0 0 0 3px rgba(122,166,90,0.2);
        }
        .dark .signup-input:focus {
            border-color: #7AA65A;
            box-shadow: 0 0 0 3px rgba(122,166,90,0.25);
        }

        /* farm button */
        .farm-btn {
            background: #36634B;
            color: white; 
            font-weight: 600; 
            padding: 0.8rem 1.8rem;
            border-radius: 50px; 
            transition: all 0.3s ease;
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            width: 100%; 
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }
        .dark .farm-btn {
            background: #7AA65A;
            color: #1F2A1E;
        }
        .farm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(54,99,75,0.35);
        }
        .dark .farm-btn:hover {
            box-shadow: 0 8px 20px rgba(122,166,90,0.35);
        }

        /* logo spin */
        .logo-icon {
            transition: transform 0.3s ease;
        }
        a:hover .logo-icon {
            transform: rotate(12deg);
        }
        
        /* RTL adjustments */
        [dir="rtl"] .signup-input { padding: 0.85rem 3rem 0.85rem 1.2rem; }
        [dir="rtl"] .input-icon { left: auto; right: 1.1rem; }
        [dir="rtl"] .fa-arrow-right { transform: scaleX(-1); }
        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 20px;
        }
        
        /* hidden utility */
        .hidden { display: none; }
        
        /* container */
        .container-tight {
            max-width: 480px;
            width: 100%;
            padding: 0 1.2rem;
        }

        /* center logo container */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        /* welcome title styles */
        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #2E3F2F;
            margin-top: 0.8rem;
            margin-bottom: 0.15rem;
            text-align: center;
            line-height: 1.2;
        }
        .dark .welcome-title {
            color: white;
        }

        .welcome-subtitle {
            font-size: 0.85rem;
            color: rgba(46, 63, 47, 0.7);
            text-align: center;
            margin-bottom: 0.8rem;
        }
        .dark .welcome-subtitle {
            color: #9CA3AF;
        }

        /* terms text style */
        .terms-text {
            font-size: 0.75rem;
            color: #6B7280;
        }
        .dark .terms-text {
            color: #9CA3AF;
        }
        .terms-link {
            color: #36634B;
            font-weight: 500;
        }
        .terms-link:hover {
            text-decoration: underline;
            color: #7AA65A;
        }
        .dark .terms-link {
            color: #7AA65A;
        }

        /* mobile friendly: stack on very small screens */
        @media (max-width: 380px) {
            .signup-card {
                padding: 1.8rem 1.5rem;
            }
            .welcome-title {
                font-size: 1.4rem;
            }
        }

        /* for very small screens, adjust toggle position */
        @media (max-width: 480px) {
            .theme-toggle-wrapper {
                top: 12px;
                right: 12px;
            }
            [dir="rtl"] .theme-toggle-wrapper {
                left: 12px;
            }
        }

        /* active nav links */
        .farm-nav-link.active {
            color: #36634B;
            border-bottom-color: #7AA65A;
        }
        .dark .farm-nav-link.active {
            color: #A7D489;
            border-bottom-color: #A7D489;
        }

        /* active mobile links */
        .farm-mob-item.active {
            background: rgba(122, 166, 90, 0.15);
            color: #36634B;
            border-left: 4px solid #7AA65A;
        }
        .dark .farm-mob-item.active {
            background: rgba(122, 166, 90, 0.2);
            color: #A7D489;
            border-left-color: #A7D489;
        }
        .farm-dropdown-item.active {
            background: rgba(122, 166, 90, 0.1);
            color: #36634B;
        }
        .dark .farm-dropdown-item.active {
            color: #A7D489;
        }
    </style>
</head>
<body class="bg-farm-cream dark:bg-dark-bg">

    <!-- ===== THEME TOGGLES - TOP-RIGHT ===== -->
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="toggle-btn" title="Dark / Light">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun hidden"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn" title="RTL / LTR">
            ⇄
        </button>
    </div>

    <!-- ===== SIGNUP CARD ===== -->
    <div class="container-tight">
        
        <!-- SIGNUP CARD -->
        <div class="signup-card animate-fade-in">
            
            <!-- ===== LOGO - CENTERED ===== -->
            <div class="logo-center">
                <a href="index.html" class="flex items-center space-x-3 rtl:space-x-reverse group">
                    <div class="logo-icon w-10 h-10 bg-farm-peat dark:bg-farm-sprout rounded-[30%_70%_70%_30%/30%_30%_70%_70%] flex items-center justify-center">
                        <i class="fas fa-carrot text-farm-cream dark:text-dark-bg text-lg"></i>
                    </div>
                    <div>
                        <span class="text-2xl font-display font-bold tracking-tight text-farm-charcoal dark:text-white">Local</span>
                        <span class="text-2xl font-display font-bold tracking-tight text-farm-peat dark:text-farm-sprout">Farm</span>
                    </div>
                </a>
                
                <h1 class="welcome-title">Join the Harvest</h1>
                <p class="welcome-subtitle">Create your farm account and become a member</p>
            </div>

            <!-- ===== SIGNUP FORM ===== -->
            <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='login.html';">
                
                <!-- full name field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-farm-peat dark:text-farm-sprout input-icon">
                        <i class="fas fa-user w-5 text-sm"></i>
                    </span>
                    <input type="text" name="name" placeholder="Full name" required
                           class="signup-input text-sm md:text-base">
                </div>

                <!-- email field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-farm-peat dark:text-farm-sprout input-icon">
                        <i class="fas fa-envelope w-5 text-sm"></i>
                    </span>
                    <input type="email" name="email" placeholder="Email address" required
                           class="signup-input text-sm md:text-base">
                </div>

                <!-- password field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-farm-peat dark:text-farm-sprout input-icon">
                        <i class="fas fa-lock w-5 text-sm"></i>
                    </span>
                    <input type="password" name="password" placeholder="Password" required
                           class="signup-input text-sm md:text-base">
                </div>

                <!-- confirm password field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-farm-peat dark:text-farm-sprout input-icon">
                        <i class="fas fa-lock w-5 text-sm"></i>
                    </span>
                    <input type="password" name="confirm_password" placeholder="Confirm password" required
                           class="signup-input text-sm md:text-base">
                </div>

                <!-- terms and conditions checkbox -->
                <div class="flex items-start space-x-2 rtl:space-x-reverse mt-2">
                    <input type="checkbox" id="terms" class="mt-1 rounded border-farm-stone dark:border-gray-600 text-farm-peat focus:ring-farm-sprout/30 dark:bg-gray-700" required>
                    <label for="terms" class="terms-text text-xs md:text-sm text-farm-charcoal/70 dark:text-gray-400">
                        I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                    </label>
                </div>

                <!-- SIGN UP BUTTON -->
                <button type="submit" class="farm-btn mt-2">
                    <i class="fas fa-user-plus mr-2 rtl:ml-2 rtl:mr-0"></i>
                    Create account
                </button>
            </form>
            
            <!-- ===== LOGIN LINK ===== -->
            <div class="mt-4 text-center">
                <span class="text-xs text-farm-charcoal/60 dark:text-gray-400">Already have an account?</span>
                <a href="login.html" class="text-xs font-semibold text-farm-peat dark:text-farm-sprout hover:text-farm-moss ml-1 rtl:mr-1 hover:underline">
                    Sign in
                </a>
            </div>
        </div>

       

   
    <!-- ===== DARK / LIGHT + RTL TOGGLE SCRIPT ===== -->
    <script>
        (function() {
            // ---------- THEME ----------
            const themeToggle = document.getElementById('theme-toggle');
            const themeIconMoon = themeToggle?.querySelector('.fa-moon');
            const themeIconSun = themeToggle?.querySelector('.fa-sun');

            function setTheme(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    if (themeIconMoon) themeIconMoon.classList.add('hidden');
                    if (themeIconSun) themeIconSun.classList.remove('hidden');
                    themeToggle?.classList.add('active');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    if (themeIconMoon) themeIconMoon.classList.remove('hidden');
                    if (themeIconSun) themeIconSun.classList.add('hidden');
                    themeToggle?.classList.remove('active');
                    localStorage.setItem('theme', 'light');
                }
            }
            const savedTheme = localStorage.getItem('theme');
            savedTheme === 'dark' ? setTheme(true) : setTheme(false);

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    setTheme(!document.documentElement.classList.contains('dark'));
                });
            }

            // ---------- RTL ----------
            const rtlBtn = document.getElementById('rtl-toggle');
            function setRTL(isRTL) {
                if (isRTL) {
                    document.documentElement.dir = 'rtl';
                    document.documentElement.lang = 'ar';
                    rtlBtn?.classList.add('active');
                    localStorage.setItem('dir', 'rtl');
                } else {
                    document.documentElement.dir = 'ltr';
                    document.documentElement.lang = 'en';
                    rtlBtn?.classList.remove('active');
                    localStorage.setItem('dir', 'ltr');
                }
            }
            const savedDir = localStorage.getItem('dir');
            savedDir === 'rtl' ? setRTL(true) : setRTL(false);

            if (rtlBtn) {
                rtlBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setRTL(document.documentElement.dir !== 'rtl');
                });
            }

            // ---------- DEMO ALERTS (only for demo interactions) ----------
            document.querySelectorAll('a[href="#"]').forEach(link => {
                if (link.textContent.includes('Terms') || link.textContent.includes('Privacy')) {
                    link.addEventListener('click', (e) => { e.preventDefault(); alert('📋 Terms & Privacy demo'); });
                }
            });

            // ── Active Link Highlighting ──────────────────────────────────
            const currentPath = window.location.pathname.split('/').pop() || 'index.html';
            document.querySelectorAll('.farm-nav-link, .farm-mob-item, .farm-dropdown-item, .mob-accordion-body a').forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath) {
                    link.classList.add('active');
                }
            });
        })();
    </script>
</body>
</html>
